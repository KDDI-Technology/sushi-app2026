<script type="module">
const $start = document.querySelector('#start');
const $outer = document.querySelector('#outer');
const $pixi_wrapper = document.querySelector('#pixi_wrapper');
const $loading = document.querySelector('#loading');
const $loadingAnim = document.querySelector('#loadingAnim');
const $main = document.querySelector('#main');
const $canModeValue = document.querySelector('#canModeValue');
const $gameConnValue = document.querySelector('#gameConnValue');
const $spongeConnValue = document.querySelector('#spongeConnValue');
const $canConnValue = document.querySelector('#canConnValue');
const $connectionValue = document.querySelector('#connectionValue');
const $dtitle = document.querySelector('#dtitle');

const $appleIcon = document.head.querySelector('link[rel="apple-touch-icon"]');
const $icon = document.head.querySelector('link[rel="icon"]');
const $logo = document.querySelector(".logo");
const $dpig = document.querySelector("#dpig");
const $usersValue = document.querySelector("#usersValue");
const $userIcon = document.querySelector("#userIcon");
const $userName = document.querySelector("#userName");
//const $userScore = document.querySelector("#userScore");

let param = location.search;

$start.onclick = async (e) => {
  $outer.classList.add("hide");
  playEfx();
  await requestWakeLock();
};

document.onvisibilitychange = async (e) =>{
  if(document.visibilityState == "hidden"){
  }else if(document.visibilityState === 'visible'){
  	if (wakeLock !== null){
      await requestWakeLock();
  	}
  }
}

let animTimer = null;
let kusoTimer = null;
const ANIM_TIME = 1000;

function startAnim(_index,mode){
  if(animTimer != null){
    clearTimeout(animTimer);
    anim.removeFace();
  }
  let sindex = Math.floor(Math.random() * 16);
  if(mode != undefined){
    smp2.playSoundOnly(null,sindex,1);
  }else{
    smp2.play(null,sindex,1);
  }
  anim.startBgLines();
  anim.addFace(_index);
  animTimer = setTimeout((e)=>{
    anim.stopBgLines();
    anim.removeFace();
    animTimer = null;
  },ANIM_TIME);
}

function startKuso(_index,mode){
  if(kusoTimer != null){
    clearTimeout(kusoTimer);
    anim.removeKuso();
  }
  let sindex = Math.floor(Math.random() * 3);
  if(mode != undefined){
    efx.playSoundOnly(null,sindex,1);
  }else{
    efx.play(null,sindex,1);
  }
  anim.startBgLines();
  anim.addKuso(_index);
  kusoTimer = setTimeout((e)=>{
    anim.stopBgLines();
    anim.removeKuso();
    kusoTimer = null;
  },ANIM_TIME);
}


///////////////////////////////////////////////////////////////////////
// UI Efx
import posmp from "/libs/posmp2.mjs";

const sampler = new posmp();
await sampler.init("/wav/efx1.wav").catch((err)=>null);

function playEfx(num){
  sampler.play();
}

import smp from "./ui/colabPlayer-cans.mjs";
let ac = new AudioContext();
const smp2 = new smp(ac);
await smp2.load();

import Efx from "./ui/efxPlayer.mjs";
const efx = new Efx(ac);
await efx.load();

///////////////////////////////////////////////////////////////////////
// screen wake lock
let wakeLock = null;

const requestWakeLock = async () => {
  try {
    if(wakeLock != null){
      if(wakeLock.released == false){
        return;
      }
    }
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => {
      console.log('Screen Wake Lock was released');
    });
    console.log('Screen Wake Lock is active');
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
};

await requestWakeLock();

///////////////////////////////////////////////////////////////////////
// animation

import animation from "./ui/animation-center.mjs";

const anim = new animation(ac);
await anim.init($pixi_wrapper);

window.addEventListener('resize', ()=>{
  const width = $main.getBoundingClientRect().width;
  const height = $main.getBoundingClientRect().height;
  anim.resize(width, height);
});

const observer = new MutationObserver(() => {
  const width = $main.getBoundingClientRect().width;
  const height = $main.getBoundingClientRect().height;
  anim.resize(width, height);
});
observer.observe($main, {
  attriblutes: true,
  attributeFilter: ["style"]
});

///////////////////////////////////////////////////////////////////////
// 缶
import Cans from "/libs/canout.mjs";
const cans = new Cans();
await cans.init();
cans.setOnChange(onChangeCans);
onChangeCans(cans.getDevices());

function onChangeCans(cans){
  if(cans.length == 0){
    $canConnValue.innerHTML = "❌";
    $canConnValue.classList.remove("connected");
  }else{
    $canConnValue.innerHTML = "⭕️";
    $canConnValue.classList.add("connected");
  }
}

///////////////////////////////////////////////////////////////////////
// スポンジ
import Sponge from "/libs/spongeMIDI.mjs";
const sponge = new Sponge();
await sponge.init();
sponge.setOnChange(onChangeSponge);
sponge.setOnSponge(onSponge);
onChangeSponge(sponge.getDevices());

function onChangeSponge(sponges){
  if(sponges.length == 0){
    $spongeConnValue.innerHTML = "❌";
    $spongeConnValue.classList.remove("connected");
  }else{
    $spongeConnValue.innerHTML = "⭕️";
    $spongeConnValue.classList.add("connected");
  }
}

function onSponge(val){

  const base = (40>val)? val : -val;
  const score = base*(Math.floor(Math.random()*50));
  console.log("onSponge() val="+val+" score="+score);  

  fire(score,0);
}

///////////////////////////////////////////////////////////////////////
// WebSocket
import {io} from "/libs/socket.io.esm.min.js";

const socket = io({transports:["websocket"],path:"/ws"});

socket.on("connect", async () => {
  console.log("socket connected :"+socket.id);
  $connectionValue.innerHTML = "⭕️";
  socket.emit("master","kuso");
  $connectionValue.classList.add("connected");
});

socket.on("disconnect", () => {
  console.log("socket disconnected");
  $connectionValue.innerHTML = "❌";
  $connectionValue.classList.remove("connected");
});

socket.on("push", (data)=>{
  console.log("push received!");
  anim.users.addUser(data);
  if(anim.game.getStatus() == 2){
    anim.game.addScore(data.score,"guest");
  }
  let sindex = Math.floor(Math.random() * 16);
  if(anim.game.getStatus() == 0){
    smp2.play(null,sindex,1);  
  }else{
    smp2.playSoundOnly(null,sindex,1);  
  }
});

socket.on("clients", (num)=>{
  console.log("clients="+num);
  $usersValue.innerHTML = num; // master なので -1 しない
});

///////////////////////////////////////////////////////////////////////
// Ranking UI
import uiRank from "./ui/ui-ranking-center.mjs";
const uirank = new uiRank($main,socket,"master");
await uirank.init();

///////////////////////////////////////////////////////////////////////
// bg image loader
import bgimage from "./ui/bgimageloader.mjs";
const imgLoader = new bgimage($pixi_wrapper);
await imgLoader.load();

///////////////////////////////////////////////////////////////////////
// Gamepad
import "/libs/joypad.min.js";

joypad.on("connect",(e)=>{
  console.log("gamepad connected! name="+e.gamepad.id);
  $gameConnValue.innerHTML = "⭕️";
  $gameConnValue.classList.add("connected");
});
joypad.on("disconnect",(e)=>{
  console.log("gamepad disconnected! name="+e.gamepad.id);
  $gameConnValue.innerHTML = "❌";
  $gameConnValue.classList.remove("connected");
});
joypad.on("button_press",(e)=>{
  const button = e.detail.buttonName;
  let index = null;
  console.log("gamepad press="+button); 
  switch(button){
  case "button_0":  index = 1; break;
  case "button_1":  index = 2; break;
  case "button_2":  index = 3; break;
  case "button_3":  index = 4; break;
  case "button_12": index = 5; break;
  case "button_13": index = 6; break;
  case "button_14": index = 7; break;
  case "button_15": index = 8; break;
  }
  if(index != null){
    startAnim(index);
    if(anim.game.getStatus() == 2){
      const score = Math.floor(Math.random()*40);
      anim.game.addScore(score,"center");
    }
  }

});

///////////////////////////////////////////////////////////////////////
// for game socket 
anim.game.setSocket(socket);
anim.game.setOnGameStatusChange(onGameStatusChange);

///////////////////////////////////////////////////////////////////////
// Loading Completed

$loading.innerHTML = "ロードがおわりました！ <br>下のボタンを押してね！ ↓↓↓";
$start.classList.remove("hide");
$loadingAnim.classList.add("hide");

///////////////////////////////////////////////////////////////////////
// Key Event
document.body.onkeydown = function(ev){
  console.log("keydown: "+ev.keyCode);
  switch(ev.keyCode){
  case 32: $start.click();  break;  // space
  case 48: testFire();  break;  // 0
  case 49: gameStart(); break;  // 1
  case 50: ; break; // 2
  case 51: ; break; // 3
  case 52: ; break; // 4
  case 53: ; break; // 5
  case 67: toggleCanMode(); break; // c
  case 69: resetGame(); break; // e
  case 82: uirank.click(); break; // r
  default:break;
  }
}

function toggleCanMode(){
  if(smp2.canMode){
    smp2.setCanMode(false);
    $canModeValue.innerHTML = "停止";
  }else{
    smp2.setCanMode(true);
    $canModeValue.innerHTML = "出力";
  }
}

function gameStart(){
  if(anim.game.getStatus() == 0){
    anim.game.start();
  }
}

function testFire(){
  const score = Math.floor(Math.random()*60);
  fire(score);
}

function fire(score,index){
  if(score >= 0){
    if(index == undefined){
      index = (score % 8)+1;
    }
    startAnim(index);
  }else{
    if(index == undefined){
      index = (score % 3);
    }
    startKuso(index);
  }
  if(anim.game.getStatus() == 2){
    anim.game.addScore(score,"center");
  }
}

function resetGame(){
  anim.game.endSession();
}

async function onGameStatusChange(e){
  switch(e.status){
  case 1:
    uirank.hide();
    break;    
  case 3:
    uirank.updateCenterScores(e.scores);
    break;    
  case 4:
    uirank.show();
    await imgLoader.load();
    break;
  default:
    break;
  }
}

</script>
